<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hors ligne — Joseph Pire</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #1a1816;
        --fg: #ece9e1;
        --muted: #9a948a;
        --accent: #c89a5e;
        --border: #322e2a;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
        line-height: 1.6;
      }
      .wrap { max-width: 460px; }
      .tag {
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 0.72rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 20px;
      }
      h1 {
        font-size: clamp(2rem, 8vw, 3rem);
        line-height: 1.1;
        margin: 0 0 20px;
        font-weight: 700;
      }
      h1 em { font-style: italic; color: var(--accent); }
      p { color: var(--muted); margin: 0 0 32px; }
      .actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
      a, button {
        font: inherit;
        font-size: 0.9rem;
        padding: 12px 24px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: transparent;
        color: var(--fg);
        text-decoration: none;
        cursor: pointer;
        transition: border-color 0.2s, color 0.2s;
      }
      a:hover, button:hover { border-color: var(--accent); color: var(--accent); }
      .lang { margin-top: 48px; font-size: 0.72rem; color: var(--muted); font-family: ui-monospace, monospace; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <p class="tag">Hors ligne</p>
      <h1>Pas de connexion,<br /><em>pour l'instant.</em></h1>
      <p>
        Cette page n'est pas disponible sans réseau. Reconnectez-vous, puis
        réessayez — les pages déjà visitées restent accessibles.
      </p>
      <div class="actions">
        <button type="button" onclick="location.reload()">Réessayer</button>
        <a href="/">Accueil</a>
      </div>
      <p class="lang">EN · You're offline — reconnect and retry. · NL · Je bent offline — verbind opnieuw.</p>
    </main>
  </body>
</html>
